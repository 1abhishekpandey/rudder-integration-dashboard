name: Validate Integration Reports

on:
  push:
    branches: [main]
    paths:
      - 'output/**'
  pull_request:
    branches: [main]
    paths:
      - 'output/**'
  workflow_dispatch:

jobs:
  validate-output:
    name: Validate Output Reports
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate output files
        run: python3 scripts/validate_output.py
