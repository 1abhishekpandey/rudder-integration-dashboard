name: Update Integration Reports

on:
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST (UTC+5:30) = 04:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script for each integration
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          for integration in $(python3 -c "from src.registry import REGISTRY; print(' '.join(REGISTRY.keys()))"); do
            echo "::group::Running $integration"
            echo "1" | python3 -m src "$integration"
            echo "::endgroup::"
          done

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet output/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build PR description
        if: steps.changes.outputs.changed == 'true'
        id: pr_body
        run: |
          BODY="## Summary\n\nAutomated daily update of integration version reports.\n\n## Changed files\n\n"
          for file in output/*_LEGACY.md; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            if git diff --quiet "$file" 2>/dev/null; then
              continue
            fi
            BODY+="### $name\n\n"
            BODY+="\`\`\`diff\n"
            BODY+="$(git diff "$file")\n"
            BODY+="\`\`\`\n\n"
          done
          # Handle new untracked files
          for file in $(git ls-files --others --exclude-standard output/); do
            name=$(basename "$file")
            BODY+="### $name (new)\n\n"
            BODY+="New report added.\n\n"
          done
          # Write to a temp file to avoid shell escaping issues
          echo -e "$BODY" > /tmp/pr_body.md

      - name: Create PR if changes detected
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/update-reports-$(date +%Y%m%d)"
          git config user.name "rudder-dashboard-bot[bot]"
          git config user.email "rudder-dashboard-bot[bot]@users.noreply.github.com"

          # Delete stale remote branch if it exists (from a previous failed run)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add output/
          git commit -m "chore: update integration reports $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update integration reports $(date +%Y-%m-%d)" \
            --body-file /tmp/pr_body.md
