name: Claude Code

on:
  pull_request:
    branches: [develop]
    paths:
      - 'output/**'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  validate-reports:
    name: Validate Output Reports
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate reports with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Read every file matching output/*_LEGACY.md and validate each one against these rules:

            RULE 1 — Links must have non-empty URLs
              Every [text](url) must have a non-empty url. Flag any [text]() with an empty URL.

            RULE 2 — Version numbers must be hyperlinks
              Every standalone version number (e.g. 3.5.0, 2.1.1) in a table cell must be wrapped
              in a [version](url) link pointing to the exact file and line on GitHub.

            RULE 3 — Status icon required before every range cell
              Any cell containing a version range (Maven bracket notation like \[x,y) or ~> x.y)
              must begin with a status icon: 🟢, 🔴, or ⚪. Flag any range cell missing the icon.

            RULE 4 — Table column counts must be consistent
              The header row, separator row, and every data row in a table must have the same
              number of columns. Flag any row that differs from the header column count.

            RULE 5 — URLs must use allowed domains only
              Every URL must use one of: github.com, mvnrepository.com, npmjs.com, pub.dev,
              firebase.google.com. Flag any URL using a different domain.

            RULE 6 — Native Integration table must have Android and iOS rows
              The "# Native Integration" section must contain exactly one Android row and one iOS row.

            RULE 7 — React Native and Flutter tables must have exactly 10 columns
              Any table under "# React Native SDK" or "# Flutter SDK" must have exactly 10 columns.

            RULE 8 — No empty cells in version or link columns
              Table cells must not be completely empty. A dash — is acceptable as an intentional
              placeholder. Flag cells that are blank.

            For each issue found, post an inline review comment on the exact line in the file
            where the problem occurs, quoting the offending content and stating which rule it violates.

            After all inline comments, post a single summary comment on the PR with:
            - A table showing each file, its pass/fail status, and the number of issues found
            - A brief description of each issue grouped by file

            Exit code 0 if all files pass. Exit code 1 if any file has issues.

  claude-assistant:
    name: Claude Assistant
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
