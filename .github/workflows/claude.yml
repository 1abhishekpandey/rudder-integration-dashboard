name: Claude Code

on:
  push:
    branches: [develop]
    paths:
      - 'output/**'
  pull_request:
    branches: [develop]
    paths:
      - 'output/**'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  validate-reports:
    name: Validate Output Reports
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate reports with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read every file matching output/*_LEGACY.md and validate each one.
            For each file, check:

            1. All markdown links [text](url) are well-formed — no broken brackets
            2. Every version number is a hyperlink pointing to the exact file and line
            3. Status icons (🟢/🔴/⚪) appear before brackets in range cells, e.g. 🟢 \[2.1.0,3.0.0)
            4. Table columns are consistent — header, separator, and data rows must have the same column count
            5. URLs use correct domains: github.com, mvnrepository.com, npmjs.com, pub.dev, firebase.google.com
            6. Native Integration table has both Android and iOS rows
            7. React Native and Flutter sections (when present) have all 10 required columns
            8. No empty cells where a version or link is expected (— is acceptable as intentional placeholder)

            If ALL files pass validation, exit with code 0.
            If ANY file has issues, print the specific errors and exit with code 1.

  claude-assistant:
    name: Claude Assistant
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
