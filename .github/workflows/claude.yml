name: Claude Code

on:
  pull_request:
    branches: [develop]
    paths:
      - 'output/**'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  validate-reports:
    name: Validate Output Reports
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate reports with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          include_fix_links: false
          prompt: |
            Validate every file matching output/*_LEGACY.md against these rules:

            RULE 1 — No empty URLs: every [text](url) must have a non-empty url. [text]() is a violation.
            RULE 2 — Version numbers must be hyperlinks: every version string (e.g. 3.5.0) in a table cell must be a [version](url) link.
            RULE 3 — Status icon before every range cell: any cell with \[x,y) or ~> x.y notation must start with 🟢, 🔴, or ⚪.
            RULE 4 — Consistent column counts: header, separator, and all data rows in a table must have the same column count.
            RULE 5 — Allowed domains only: every URL must use github.com, mvnrepository.com, npmjs.com, pub.dev, or firebase.google.com.
            RULE 6 — Native table must have Android and iOS rows.
            RULE 7 — React Native and Flutter tables must have exactly 10 columns.
            RULE 8 — No blank cells: empty table cells are violations (— is acceptable as a placeholder).

            Post one summary PR comment with:
            - A table: File | Status | Issues Found
            - One line per violation: file name, line number, rule violated, and exactly what to fix
            - Do NOT include meta-commentary, commit hashes, "Fix this" links, or notes about why errors exist

            Exit 0 if all files pass. Exit 1 if any file has violations.

  claude-assistant:
    name: Claude Assistant
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
